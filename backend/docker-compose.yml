services:
  db:
    image: postgres:16-alpine
    container_name: pharmacy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pharmacy
      POSTGRES_USER: pharmacy_user
      POSTGRES_PASSWORD: pharmacy_secret
    ports:
      - "5432:5432"
    volumes:
      # Только данные, без init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmacy_user -d pharmacy"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./pharmacy-api
      dockerfile: Dockerfile
    container_name: pharmacy-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://pharmacy_user:pharmacy_secret@db:5432/pharmacy?sslmode=disable"
      SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
